<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMO</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0b0b12;
  --surface: #13131e;
  --surf2:   #1c1c2b;
  --border:  #252535;
  --accent:  #00e5a0;
  --accent2: #00b87f;
  --text:    #e2e2ee;
  --muted:   #55556a;
  --red:     #ff5555;
  --amber:   #ffb84d;
  --blue:    #6699ff;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
  height: 100dvh;
  display: grid;
  grid-template-rows: 52px 1fr 0px auto;
  overflow: hidden;
  user-select: none;
  transition: grid-template-rows .25s ease;
}
body.term-open {
  grid-template-rows: 52px 1fr 190px auto;
}

/* ── HEADER ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 18px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}

.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 700;
  font-size: 15px;
  letter-spacing: 2.5px;
  color: var(--accent);
}

.logo-sq {
  width: 26px; height: 26px;
  background: var(--accent);
  border-radius: 5px;
  display: grid;
  place-items: center;
  color: #000;
}

#conn-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 20px;
  background: var(--surf2);
  border: 1px solid var(--border);
  font-size: 12px;
  color: var(--muted);
  transition: color .3s, border-color .3s;
}
#conn-badge.ok  { color: var(--accent); border-color: rgba(0,229,160,.3); }
#conn-badge.err { color: var(--red);    border-color: rgba(255,85,85,.3); }

.cdot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
}
#conn-badge.ok .cdot { animation: blink 2.5s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

/* ── CONVERSATION ── */
#chat {
  overflow-y: auto;
  padding: 18px 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  scroll-behavior: smooth;
}
#chat::-webkit-scrollbar { width: 3px; }
#chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

#empty {
  margin: auto;
  text-align: center;
  color: var(--muted);
  font-size: 13px;
  line-height: 2;
  pointer-events: none;
}

.bubble {
  display: flex;
  flex-direction: column;
  max-width: min(78%, 480px);
  animation: pop-in .22s ease;
}
@keyframes pop-in {
  from { opacity:0; transform:translateY(5px); }
  to   { opacity:1; transform:translateY(0); }
}
.bubble.you { align-self: flex-end; }
.bubble.bmo { align-self: flex-start; }

.blabel {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 5px;
  padding-left: 2px;
}
.bubble.you .blabel { color: var(--muted); text-align: right; }
.bubble.bmo .blabel { color: var(--accent2); }

.bbody {
  padding: 10px 13px;
  border-radius: 11px;
  font-size: 14px;
  line-height: 1.55;
  word-break: break-word;
}
.bubble.you .bbody {
  background: var(--surf2);
  border: 1px solid var(--border);
  border-bottom-right-radius: 3px;
}
.bubble.bmo .bbody {
  background: rgba(0,229,160,.06);
  border: 1px solid rgba(0,229,160,.14);
  border-bottom-left-radius: 3px;
}

/* ── CONTROLS ── */
#controls {
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 16px 18px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

#status {
  font-size: 13px;
  color: var(--muted);
  min-height: 18px;
  transition: color .3s;
}
.state-recording #status { color: var(--red); }
.state-processing #status { color: var(--amber); }
.state-speaking   #status { color: var(--accent); }
.state-review     #status { color: var(--blue); }

/* ── MIC BUTTON ── */
#mic-wrap {
  position: relative;
  width: 88px; height: 88px;
  display: grid;
  place-items: center;
}

.ring {
  position: absolute;
  border-radius: 50%;
  border: 1.5px solid transparent;
  pointer-events: none;
  transition: border-color .3s;
}
.ring-a { width: 88px; height: 88px; }
.ring-b { width: 72px; height: 72px; }

/* ring colors per state */
.state-recording  .ring { border-color: var(--red);   animation: rpulse .9s ease-in-out infinite; }
.state-processing .ring-b { border-color: var(--amber); border-top-color: transparent; animation: spin .85s linear infinite; }
.state-processing .ring-a { border-color: rgba(255,184,77,.2); animation: rpulse 2s ease-in-out infinite; }
.state-speaking   .ring { border-color: var(--accent); animation: rpulse .7s ease-in-out infinite; }
.state-recording  .ring-b { animation-delay: .12s; }

@keyframes rpulse { 0%,100%{transform:scale(1);opacity:.7} 50%{transform:scale(1.1);opacity:.2} }
@keyframes spin   { to { transform:rotate(360deg); } }

#mic-btn {
  width: 62px; height: 62px;
  border-radius: 50%;
  background: var(--surf2);
  border: 2px solid var(--border);
  cursor: pointer;
  display: grid;
  place-items: center;
  position: relative;
  z-index: 1;
  transition: background .2s, border-color .2s, transform .1s;
  color: var(--muted);
}
#mic-btn:hover:not(:disabled) { transform: scale(1.07); color: var(--text); }
#mic-btn:active:not(:disabled) { transform: scale(.95); }
#mic-btn:disabled { cursor: default; opacity: .6; }

.state-recording  #mic-btn { background: rgba(255,85,85,.12);  border-color: var(--red);   color: var(--red); }
.state-processing #mic-btn { background: rgba(255,184,77,.08); border-color: var(--amber); color: var(--amber); }
.state-speaking   #mic-btn { background: rgba(0,229,160,.08);  border-color: var(--accent); color: var(--accent); }

/* hide review panel unless review state */
#review-panel { display: none; flex-direction: column; align-items: center; gap: 10px; width: 100%; max-width: 340px; }
.state-review #mic-wrap    { display: none; }
.state-review #wave-wrap   { display: none; }
.state-review #review-panel { display: flex; }

/* wave bars — visible only while speaking */
#wave-wrap {
  display: none;
  align-items: flex-end;
  gap: 3px;
  height: 26px;
}
.state-speaking #wave-wrap { display: flex; }

.wb {
  width: 3px;
  border-radius: 2px;
  background: var(--accent);
  animation: wdance var(--d,.5s) ease-in-out infinite alternate;
}
@keyframes wdance { from{height:3px;opacity:.35} to{height:20px;opacity:1} }

/* timer */
#timer {
  font-size: 12px;
  font-variant-numeric: tabular-nums;
  color: var(--red);
  min-height: 16px;
  opacity: 0;
  transition: opacity .2s;
}
.state-recording #timer { opacity: 1; }

/* ── REVIEW PANEL ── */
#wf-canvas {
  width: 100%;
  height: 50px;
  background: var(--surf2);
  border: 1px solid var(--border);
  border-radius: 7px;
  display: block;
}

.row { display: flex; gap: 8px; width: 100%; }

.btn {
  flex: 1;
  padding: 9px 6px;
  border: none;
  border-radius: 7px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  transition: opacity .15s, transform .1s;
}
.btn:hover  { opacity: .85; }
.btn:active { transform: scale(.97); }
.btn-ghost { background: var(--surf2); border: 1px solid var(--border); color: var(--muted); }
.btn-send  { background: var(--accent); color: #000; }
.btn-play  { flex: 0 0 auto; background: var(--surf2); border: 1px solid var(--border); color: var(--text); padding: 9px 14px; }

/* ── TERMINAL ── */
#terminal {
  overflow: hidden;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  background: #090910;
  font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
}

#term-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 5px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

#term-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 6px;
}

.term-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent);
  animation: blink 2s ease-in-out infinite;
}

#term-clear {
  font-size: 10px;
  color: var(--muted);
  background: none;
  border: none;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 3px;
  transition: color .15s, background .15s;
}
#term-clear:hover { color: var(--text); background: var(--surf2); }

#term-log {
  flex: 1;
  overflow-y: auto;
  padding: 6px 0;
  font-size: 11.5px;
  line-height: 1.6;
}
#term-log::-webkit-scrollbar { width: 3px; }
#term-log::-webkit-scrollbar-thumb { background: var(--border); }

.tline {
  display: grid;
  grid-template-columns: 60px 16px 80px 1fr;
  gap: 0 8px;
  padding: 1px 12px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  animation: fade-row .12s ease;
}
@keyframes fade-row { from{opacity:0} to{opacity:1} }

.tline:hover { background: rgba(255,255,255,.03); }

.t-ts   { color: #3a3a55; }
.t-dir  { font-weight: 700; }
.t-send .t-dir  { color: var(--blue); }
.t-recv .t-dir  { color: var(--accent2); }
.t-err  .t-dir  { color: var(--red); }

.t-type { }
.t-send .t-type  { color: #4466aa; }
.t-recv .t-type  { }

/* per-type colours */
.t-filler   .t-type { color: var(--amber); }
.t-chunk    .t-type { color: var(--accent2); }
.t-transcript .t-type { color: var(--blue); }
.t-reply    .t-type { color: var(--accent); }
.t-done     .t-type { color: var(--muted); }
.t-silence  .t-type { color: var(--muted); }
.t-error    .t-type { color: var(--red); }

.t-payload { color: #5a5a7a; overflow: hidden; text-overflow: ellipsis; }
.t-filler   .t-payload { color: #665530; }
.t-chunk    .t-payload { color: #2a5a40; }
.t-transcript .t-payload,
.t-reply    .t-payload { color: #ccc; }

/* terminal toggle button in header */
#term-toggle {
  background: none;
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--muted);
  cursor: pointer;
  padding: 3px 8px;
  font-size: 11px;
  display: flex;
  align-items: center;
  gap: 4px;
  transition: color .15s, border-color .15s, background .15s;
}
#term-toggle:hover { color: var(--text); border-color: var(--accent2); background: var(--surf2); }
body.term-open #term-toggle { color: var(--accent); border-color: rgba(0,229,160,.4); }
</style>
</head>
<body class="state-idle">

<header>
  <div class="logo">
    <div class="logo-sq">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="12" cy="12" r="9"/><path d="M8 12h8M12 8v8"/></svg>
    </div>
    BMO
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <button id="term-toggle" title="Toggle socket log">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
      Log
    </button>
    <div id="conn-badge">
      <div class="cdot"></div>
      <span id="conn-lbl">Connecting…</span>

</header>

<div id="chat">
  <div id="empty">
    Press the mic and say<br>
    <strong style="color:#8888a8">"Lumi, tell me a joke"</strong><br>

  </div>
</div>

  <div id="term-header">

      <div class="term-dot"></div>

</div>

<div id="controls">
  <div id="status">Connecting…</div>

  <div id="mic-wrap">
    <div class="ring ring-a"></div>
    <div class="ring ring-b"></div>
    <button id="mic-btn" title="Tap or hold Space">
      <svg id="i-mic" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="11" rx="3"/>
        <path d="M19 10a7 7 0 0 1-14 0"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8"  y1="23" x2="16" y2="23"/>
      </svg>
      <svg id="i-stop" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display:none">
        <rect x="4" y="4" width="16" height="16" rx="2"/>
      </svg>
    </button>
  </div>

  <div id="wave-wrap">
    <div class="wb" style="--d:.55s"></div>
    <div class="wb" style="--d:.72s;animation-delay:.08s"></div>
    <div class="wb" style="--d:.43s;animation-delay:.18s"></div>
    <div class="wb" style="--d:.65s;animation-delay:.04s"></div>
    <div class="wb" style="--d:.50s;animation-delay:.14s"></div>
    <div class="wb" style="--d:.38s;animation-delay:.22s"></div>
  </div>

  <div id="timer"></div>

  <div id="review-panel">

    <div class="row">

        <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
        Play
      </button>
      <button class="btn btn-ghost" id="btn-retake">Retake</button>
      <button class="btn btn-send"  id="btn-send">Send →</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ── GAPLESS AUDIO QUEUE ──────────────────────────────────────────────────────
// Uses Web Audio API precise scheduling so filler → speech transition is seamless.
// Decoding is chained in a Promise queue to preserve order while staying async.
class AudioQueue {
  constructor() {
    this._actx  = null;
    this._next  = 0;       // next scheduled start time in AudioContext time
    this._chain = Promise.resolve();
    this._srcs  = [];
  }

  _ctx() {
    if (!this._actx) this._actx = new (window.AudioContext || window.webkitAudioContext)();
    if (this._actx.state === 'suspended') this._actx.resume();
    return this._actx;
  }

  enqueue(b64) {
    // Chain decoding so order is preserved even if network reorders
    this._chain = this._chain.then(async () => {
      const ctx = this._ctx();
      const bin = atob(b64);
      const u8  = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
      let buf;
      try { buf = await ctx.decodeAudioData(u8.buffer); }
      catch { return; }

      const src = ctx.createBufferSource();
      src.buffer = buf;
      src.connect(ctx.destination);

      // Schedule gaplessly — 40 ms headroom for decode/schedule jitter
      const when = Math.max(ctx.currentTime + 0.04, this._next);
      src.start(when);
      this._next = when + buf.duration;
      this._srcs.push(src);
    });
  }

  reset() {
    this._srcs.forEach(s => { try { s.stop(); } catch {} });
    this._srcs  = [];
    this._next  = 0;
    this._chain = Promise.resolve();
    if (this._actx) { this._actx.close(); this._actx = null; }
  }

  get isPlaying() {
    return this._actx && this._next > this._actx.currentTime;
  }
}

// ── RECORDER ─────────────────────────────────────────────────────────────────
// Records via MediaRecorder, resamples to 16 kHz mono, encodes as WAV.
class Recorder {
  constructor() { this._wav = null; }

  async start(onTick) {
    this._stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    this._chunks = [];
    this._mr     = new MediaRecorder(this._stream);
    this._mr.ondataavailable = e => e.data.size && this._chunks.push(e.data);
    this._mr.start(80);
    const t0 = Date.now();
    this._tick = setInterval(() => onTick(((Date.now() - t0) / 1000).toFixed(1)), 100);
  }

  stop() {
    clearInterval(this._tick);
    return new Promise(resolve => {
      this._mr.onstop = async () => {
        this._stream.getTracks().forEach(t => t.stop());
        const ab  = await new Blob(this._chunks, { type: this._mr.mimeType }).arrayBuffer();
        const dec = new AudioContext();
        const buf = await dec.decodeAudioData(ab);
        dec.close();
        const rs  = await this._resample(buf, 16000);
        this._wav = this._toWav(rs);
        resolve(this._wav);
      };
      this._mr.stop();
    });
  }

  async _resample(buf, sr) {
    const frames = Math.ceil(buf.duration * sr);
    const off    = new OfflineAudioContext(1, frames, sr);
    // Mix down to mono
    const mono   = off.createBuffer(1, buf.length, buf.sampleRate);
    const dst    = mono.getChannelData(0);
    for (let ch = 0; ch < buf.numberOfChannels; ch++) {
      const src = buf.getChannelData(ch);
      for (let i = 0; i < src.length; i++) dst[i] += src[i];
    }
    if (buf.numberOfChannels > 1) for (let i = 0; i < dst.length; i++) dst[i] /= buf.numberOfChannels;
    const s = off.createBufferSource();
    s.buffer = mono;
    s.connect(off.destination);
    s.start(0);
    return off.startRendering();
  }

  _toWav(buf) {
    const pcm = buf.getChannelData(0);
    const sr  = buf.sampleRate;
    const ab  = new ArrayBuffer(44 + pcm.length * 2);
    const v   = new DataView(ab);
    const ws  = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
    ws(0,'RIFF'); v.setUint32(4, 36 + pcm.length * 2, true); ws(8,'WAVE');
    ws(12,'fmt '); v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,1,true);
    v.setUint32(24,sr,true); v.setUint32(28,sr*2,true); v.setUint16(32,2,true); v.setUint16(34,16,true);
    ws(36,'data'); v.setUint32(40, pcm.length * 2, true);
    for (let i = 0; i < pcm.length; i++) {
      const s = Math.max(-1, Math.min(1, pcm[i]));
      v.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
    }
    return ab;
  }

  drawWaveform(canvas) {
    if (!this._wav) return;
    const dv  = new DataView(this._wav);
    const tot = (this._wav.byteLength - 44) / 2;
    const W   = canvas.width  = canvas.offsetWidth  * devicePixelRatio;
    const H   = canvas.height = canvas.offsetHeight * devicePixelRatio;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, W, H);
    ctx.strokeStyle = '#00e5a0';
    ctx.lineWidth   = 1.5 * devicePixelRatio;
    ctx.beginPath();
    for (let x = 0; x < W; x++) {
      const idx = Math.floor((x / W) * tot);
      const s   = dv.getInt16(44 + idx * 2, true) / 32768;
      const y   = (0.5 - s * 0.43) * H;
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  get wav() { return this._wav; }
}

// ── APP ──────────────────────────────────────────────────────────────────────
const queue = new AudioQueue();
const rec   = new Recorder();

let ws      = null;
let wsOk    = false;
let appState = 'idle';

const el = id => document.getElementById(id);
const $chat    = el('chat');
const $empty   = el('empty');
const $status  = el('status');
const $micBtn  = el('mic-btn');
const $iMic    = el('i-mic');
const $iStop   = el('i-stop');
const $timer   = el('timer');
const $canvas  = el('wf-canvas');
const $badge   = el('conn-badge');
const $badgeLbl= el('conn-lbl');

// ── WebSocket ──
function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/api/v1/ws/talk`);

  let _reconnTimer = null;

  function _scheduleReconnect() {
    if (_reconnTimer) return;           // already scheduled — don't double-up
    _reconnTimer = setTimeout(() => {
      _reconnTimer = null;
      connect();
    }, 3000);
  }

  ws.onopen = () => {
    wsOk = true;
    $badge.className = 'ok';
    $badgeLbl.textContent = 'Connected';
    termLog('recv', 'open', `ws://${location.host}/api/v1/ws/talk`);
    setState('idle');
  };

  ws.onerror = () => {
    // onerror is always followed by onclose — let onclose drive the reconnect
    wsOk = false;
  };

  ws.onclose = () => {
    const wasOk = wsOk;
    wsOk = false;
    $badge.className = 'err';
    $badgeLbl.textContent = 'Reconnecting…';
    if (wasOk) termLog('recv', 'close', 'reconnecting in 3 s…');
    setState('idle');
    _scheduleReconnect();
  };

  ws.onmessage = ({ data }) => {
    const msg = JSON.parse(data);
    switch (msg.type) {

      case 'filler': {
        const kb = msg.audio ? (msg.audio.length * 0.75 / 1024).toFixed(1) : '?';
        termLog('recv', 'filler', `[audio  ${kb} kB]`);
        queue.enqueue(msg.audio);
        if (appState !== 'processing') setState('processing');
        break;
      }

      case 'transcript':
        termLog('recv', 'transcript', `"${msg.text}"`);
        addBubble('you', msg.text);
        break;

      case 'reply':
        termLog('recv', 'reply', `"${msg.text}"`);
        addBubble('bmo', msg.text);
        break;

      case 'chunk': {
        const kb = msg.audio ? (msg.audio.length * 0.75 / 1024).toFixed(1) : '?';
        termLog('recv', 'chunk', `[audio  ${kb} kB]`);
        queue.enqueue(msg.audio);
        setState('speaking');
        break;
      }

      case 'silence':
        termLog('recv', 'silence', '');
        waitDrain(() => setState('idle'));
        break;

      case 'done':
        termLog('recv', 'done', '');
        waitDrain(() => setState('idle'));
        break;

      case 'error':
        termLog('recv', 'error', msg.message);
        queue.reset();
        setState('idle');
        setLabel(`Error: ${msg.message}`);
        break;
    }
  };
}

// Poll until audio drains, then run callback
let _drainTimer = null;
function waitDrain(cb) {
  clearTimeout(_drainTimer);
  (function check() {
    if (!queue.isPlaying) { cb(); return; }
    _drainTimer = setTimeout(check, 150);
  })();
}

// ── State ──
function setState(s) {
  appState = s;
  document.body.className = `state-${s}`;
  const labels = {
    idle:       'Tap the mic to speak',
    recording:  'Recording… tap again to stop',
    review:     'Confirm or retake',
    processing: 'Thinking',
    speaking:   'BMO is speaking',
  };
  setLabel(labels[s] || '');
  $micBtn.disabled = (s === 'processing' || s === 'speaking');
  $iMic.style.display  = s === 'recording' ? 'none' : '';
  $iStop.style.display = s === 'recording' ? ''     : 'none';
}

function setLabel(t) {
  // Animated dots for "Thinking"
  $status.innerHTML = appState === 'processing'
    ? `${t}<span class="dots"></span>`
    : t;
}

// Inject dots animation
document.head.insertAdjacentHTML('beforeend', `<style>
.dots::after {
  content: '';
  animation: dot3 1.3s steps(3, end) infinite;
}
@keyframes dot3 {
  0%  { content: '.';   }
  33% { content: '..';  }
  66% { content: '...'; }
  99% { content: '';    }
}
</style>`);

// ── Mic button ──
$micBtn.addEventListener('click', async () => {
  if (!wsOk) return;
  if (appState === 'idle') {
    try {
      setState('recording');
      await rec.start(t => { $timer.textContent = `${t}s`; });
    } catch {
      setState('idle');
      setLabel('Mic access denied');
    }
  } else if (appState === 'recording') {
    $timer.textContent = '';
    setState('review');
    await rec.stop();
    rec.drawWaveform($canvas);
  }
});

// ── Review ──
el('btn-play').addEventListener('click', () => {
  if (!rec.wav) return;
  const url = URL.createObjectURL(new Blob([rec.wav], { type: 'audio/wav' }));
  const a   = new Audio(url);
  a.onended = () => URL.revokeObjectURL(url);
  a.play();
});

el('btn-retake').addEventListener('click', () => {
  queue.reset();
  setState('idle');
});

el('btn-send').addEventListener('click', () => {
  if (!rec.wav || !wsOk) return;
  queue.reset();
  ws.send(rec.wav);
  setState('processing');
});

// ── Chat bubbles ──
function addBubble(who, text) {
  $empty?.remove();
  const wrap = document.createElement('div');
  wrap.className = `bubble ${who}`;
  wrap.innerHTML = `
    <div class="blabel">${who === 'you' ? 'You' : 'BMO'}</div>
    <div class="bbody">${text.replace(/</g,'&lt;')}</div>
  `;
  $chat.appendChild(wrap);
  $chat.scrollTop = $chat.scrollHeight;
}

// ── Keyboard shortcut ──
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && !e.repeat && document.activeElement === document.body) {
    e.preventDefault();
    $micBtn.click();
  }
});

// ── Terminal ──────────────────────────────────────────────────────────────────
const $termLog = el('term-log');
const MAX_LINES = 120;

el('term-toggle').addEventListener('click', () => {
  document.body.classList.toggle('term-open');
});

el('term-clear').addEventListener('click', () => {
  $termLog.innerHTML = '';
});

function termLog(dir, type, payload = '') {
  const now = new Date();
  const ts  = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  const arrow = dir === 'send' ? '↑' : '↓';

  const row = document.createElement('div');
  row.className = `tline t-${dir} t-${type}`;
  row.innerHTML =
    `<span class="t-ts">${ts}</span>` +
    `<span class="t-dir">${arrow}</span>` +
    `<span class="t-type">${type}</span>` +
    `<span class="t-payload">${payload.replace(/</g,'&lt;')}</span>`;

  $termLog.appendChild(row);

  // Cap log size
  while ($termLog.children.length > MAX_LINES) $termLog.firstChild.remove();

  // Auto-scroll only if already near bottom
  const d = $termLog;
  if (d.scrollHeight - d.scrollTop - d.clientHeight < 60) {
    d.scrollTop = d.scrollHeight;
  }
}

// Patch ws.send to log outgoing binary
const _origConnect = connect;
// We intercept after connect() creates the ws — see patched ws.send below

// ── Start ──
connect();

// Patch send AFTER connect() has run
const _origSend = ws.send.bind(ws);
ws.send = function(data) {
  if (data instanceof ArrayBuffer) {
    termLog('send', 'audio', `[wav  ${(data.byteLength / 1024).toFixed(1)} kB]`);
  }
  return _origSend(data);
};
</script>
