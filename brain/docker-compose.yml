services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - app_data:/app/data
    environment:
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:3b}
      - STT_PROVIDER=local
      - WHISPER_MODEL=base
      - PIPER_MODEL_PATH=/app/data/piper/en_GB-alan-low.onnx
      - HF_API_TOKEN=${HF_API_TOKEN:-}
      - HF_WHISPER_MODEL=${HF_WHISPER_MODEL:-openai/whisper-base}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  db:
    image: postgres:alpine
    environment:
      - POSTGRES_USER=bmo
      - POSTGRES_PASSWORD=bmo_pass
      - POSTGRES_DB=bmo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bmo -d bmo_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    profiles: ["ollama"]
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  app_data:
  postgres_data:
  redis_data:
  ollama_data:
