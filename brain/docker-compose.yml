services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data/whisper:/app/data/whisper
      - ./data/xtts:/app/data/xtts
      - ./data/bmo_voice:/app/data/bmo_voice
      - ./data/bmo:/app/data/bmo:ro
    env_file: .env
    environment:
      # Timezone — IST (UTC+5:30)
      - TZ=Asia/Kolkata
      # Container-internal paths — not user-configurable, never go in .env
      - PIPER_MODEL_PATH=/opt/piper-models/en_GB-alan-low.onnx
      - XTTS_REFERENCE_AUDIO=/app/data/bmo_voice/reference.wav
      - XTTS_CACHE_DIR=/app/data/xtts
      - COQUI_TOS_AGREED=1
      - HF_TOKEN=${HF_API_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  db:
    image: postgres:alpine
    environment:
      - POSTGRES_USER=bmo
      - POSTGRES_PASSWORD=bmo_pass
      - POSTGRES_DB=bmo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bmo -d bmo_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-bmo}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-bmo_secret}
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # redis:
  #   image: redis:alpine
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  ollama:
    profiles: ["ollama"]
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data:
  postgres_data:
  minio_data:
